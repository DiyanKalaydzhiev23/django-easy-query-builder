<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django Query Builder - Visual Database Query Tool</title>
    <meta
      name="description"
      content="Build complex Django database queries visually with AND/OR/NOT operators, nested conditions, and multi-model support. No code required."
    />
    <meta name="author" content="Django Query Builder" />

    <meta property="og:title" content="Django Query Builder - Visual Database Query Tool" />
    <meta
      property="og:description"
      content="Build complex Django database queries visually with AND/OR/NOT operators, nested conditions, and multi-model support"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="public/favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="page">
      <div class="page-inner">
        <div class="layout">
          <section class="card">
            <div class="card-header">
              <div class="card-header-top">
                <h2 class="card-title">Query Builder</h2>
                <button
                  id="preview-toggle"
                  class="btn btn-outline btn-sm"
                  type="button"
                  aria-expanded="false"
                  aria-controls="preview-wrapper"
                >
                  Show Preview
                </button>
              </div>
              <p class="card-description">Add conditions and groups to build your query</p>
            </div>
            <div class="card-content">
              <div id="query-root"></div>
            </div>
          </section>

          <section id="preview-wrapper" class="preview-wrapper is-hidden" aria-hidden="true">
            <div class="card preview-card">
              <div class="card-header">
                <h2 class="card-title">Query Preview</h2>
              </div>
              <div class="card-content preview-content">
                <div class="preview-section">
                  <h3 class="preview-heading">Readable Format:</h3>
                  <pre id="readable-preview" class="code-block">No conditions defined</pre>
                </div>
                <div class="preview-section">
                  <h3 class="preview-heading">Django ORM (Q objects):</h3>
                  <pre id="django-preview" class="code-block">from django.db.models import Q

query = Q()</pre>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="main.js" defer></script>
  </body>
</html>
